name: ci

on:
  push:
  pull_request:

# v2 CI is intentionally thin (ADR-0001 D2/D5): install · typecheck · test · topology.
# The v1 gates (validate-contracts, schemas/dist drift, cocoder-cli parity, stale-reference,
# public-readiness) were governance-of-governance machinery (failure-catalog F5) and were
# deleted in the Phase-1 v1 decommission. Add a check back only when a real failure earns it.
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: Topology check (inward-only deps, ADR-0008)
        run: node scripts/check-topology.mjs
